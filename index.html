<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FormForge AI</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-border: hsl(var(--border));
      --color-input: hsl(var(--input));
      --color-ring: hsl(var(--ring));
      --color-background: hsl(var(--background));
      --color-foreground: hsl(var(--foreground));

      --color-primary: hsl(var(--primary));
      --color-primary-foreground: hsl(var(--primary-foreground));

      --color-secondary: hsl(var(--secondary));
      --color-secondary-foreground: hsl(var(--secondary-foreground));

      --color-destructive: hsl(var(--destructive));
      --color-destructive-foreground: hsl(var(--destructive-foreground));

      --color-muted: hsl(var(--muted));
      --color-muted-foreground: hsl(var(--muted-foreground));

      --color-accent: hsl(var(--accent));
      --color-accent-foreground: hsl(var(--accent-foreground));

      --color-popover: hsl(var(--popover));
      --color-popover-foreground: hsl(var(--popover-foreground));

      --color-card: hsl(var(--card));
      --color-card-foreground: hsl(var(--card-foreground));

      --color-chart-1: hsl(var(--chart-1));
      --color-chart-2: hsl(var(--chart-2));
      --color-chart-3: hsl(var(--chart-3));
      --color-chart-4: hsl(var(--chart-4));
      --color-chart-5: hsl(var(--chart-5));

      --radius-lg: var(--radius);
      --radius-md: calc(var(--radius) - 2px);
      --radius-sm: calc(var(--radius) - 4px);

      --animate-accordion-down: accordion-down 0.2s ease-out;
      --animate-accordion-up: accordion-up 0.2s ease-out;

      @keyframes accordion-down {
        from { height: 0 }
        to { height: var(--radix-accordion-content-height) }
      }
      @keyframes accordion-up {
        from { height: var(--radix-accordion-content-height) }
        to { height: 0 }
      }
    }

    @utility container {
      margin-inline: auto;
      padding-inline: 2rem;
      @media (width >= 1400px) {
        max-width: 1400px;
      }
    }

    @variant dark (&:where(.dark, .dark *));

    @layer base {
      :root {
        --background: 0 0% 100%;
        --foreground: 0 0% 3.9%;
        --card: 0 0% 100%;
        --card-foreground: 0 0% 3.9%;
        --popover: 0 0% 100%;
        --popover-foreground: 0 0% 3.9%;
        --primary: 0 0% 9%;
        --primary-foreground: 0 0% 98%;
        --secondary: 0 0% 96.1%;
        --secondary-foreground: 0 0% 9%;
        --muted: 0 0% 96.1%;
        --muted-foreground: 0 0% 45.1%;
        --accent: 0 0% 96.1%;
        --accent-foreground: 0 0% 9%;
        --destructive: 0 84.2% 60.2%;
        --destructive-foreground: 0 0% 98%;
        --border: 0 0% 89.8%;
        --input: 0 0% 89.8%;
        --ring: 0 0% 3.9%;
        --radius: 0.5rem;
        --chart-1: 12 76% 61%;
        --chart-2: 173 58% 39%;
        --chart-3: 197 37% 24%;
        --chart-4: 43 74% 66%;
        --chart-5: 27 87% 67%;
      }
      .dark {
        --background: 0 0% 3.9%;
        --foreground: 0 0% 98%;
        --card: 0 0% 3.9%;
        --card-foreground: 0 0% 98%;
        --popover: 0 0% 3.9%;
        --popover-foreground: 0 0% 98%;
        --primary: 0 0% 98%;
        --primary-foreground: 0 0% 9%;
        --secondary: 0 0% 14.9%;
        --secondary-foreground: 0 0% 98%;
        --muted: 0 0% 14.9%;
        --muted-foreground: 0 0% 63.9%;
        --accent: 0 0% 14.9%;
        --accent-foreground: 0 0% 98%;
        --destructive: 358.75 100% 70%;
        --destructive-foreground: 0 0% 98%;
        --border: 0 0% 14.9%;
        --input: 0 0% 14.9%;
        --ring: 0 0% 83.1%;
        --chart-1: 220 70% 50%;
        --chart-2: 160 60% 45%;
        --chart-3: 30 80% 55%;
        --chart-4: 280 65% 60%;
        --chart-5: 340 75% 55%;
      }
    }
    @layer base {
      * {
        @apply border-border outline-ring/50;
      }
      body {
        @apply bg-background text-foreground;
      }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css"

    "@radix-ui/react-slot": "https://esm.sh/@radix-ui/react-slot@1.1.0?external=react,react-dom",
    "@radix-ui/react-label": "https://esm.sh/@radix-ui/react-label@2.1.0?external=react,react-dom",
    "@radix-ui/react-switch": "https://esm.sh/@radix-ui/react-switch@1.1.0?external=react,react-dom",

    "@radix-ui/react-select": "https://esm.sh/@radix-ui/react-select@2.2.6?external=react,react-dom",
    "@radix-ui/react-dialog": "https://esm.sh/@radix-ui/react-dialog@1.1.15?external=react,react-dom",
    "@radix-ui/react-tabs": "https://esm.sh/@radix-ui/react-tabs@1.1.1?external=react,react-dom",

    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@radix-ui/react-toggle": "https://esm.sh/@radix-ui/react-toggle@1.1.0?external=react,react-dom",
    "@radix-ui/react-toggle-group": "https://esm.sh/@radix-ui/react-toggle-group@1.1.0?external=react,react-dom",
    "react-aria-components": "https://esm.sh/react-aria-components@1.13.0?external=react,react-dom"
  }
}
</script>
</head>

<body class="bg-background text-foreground antialiased overflow-hidden transition-colors duration-200">
  <div id="root" class="h-screen w-screen flex flex-col"></div>
</body>

</html>
