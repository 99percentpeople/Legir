<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FormForge AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --background: 0 0% 100%;
        --foreground: 240 10% 3.9%;
        --card: 0 0% 100%;
        --card-foreground: 240 10% 3.9%;
        --popover: 0 0% 100%;
        --popover-foreground: 240 10% 3.9%;
        --primary: 240 5.9% 10%;
        --primary-foreground: 0 0% 98%;
        --secondary: 240 4.8% 95.9%;
        --secondary-foreground: 240 5.9% 10%;
        --muted: 240 4.8% 95.9%;
        --muted-foreground: 240 3.8% 46.1%;
        --accent: 240 4.8% 95.9%;
        --accent-foreground: 240 5.9% 10%;
        --destructive: 0 84.2% 60.2%;
        --destructive-foreground: 0 0% 98%;
        --border: 240 5.9% 90%;
        --input: 240 5.9% 90%;
        --ring: 240 5.9% 10%;
        --radius: 0.5rem;
      }
      .dark {
        --background: 240 10% 3.9%;
        --foreground: 0 0% 98%;
        --card: 240 10% 3.9%;
        --card-foreground: 0 0% 98%;
        --popover: 240 10% 3.9%;
        --popover-foreground: 0 0% 98%;
        --primary: 0 0% 98%;
        --primary-foreground: 240 5.9% 10%;
        --secondary: 240 3.7% 15.9%;
        --secondary-foreground: 0 0% 98%;
        --muted: 240 3.7% 15.9%;
        --muted-foreground: 240 5% 64.9%;
        --accent: 240 3.7% 15.9%;
        --accent-foreground: 0 0% 98%;
        --destructive: 0 62.8% 30.6%;
        --destructive-foreground: 0 0% 98%;
        --border: 240 3.7% 15.9%;
        --input: 240 3.7% 15.9%;
        --ring: 240 4.9% 83.9%;
      }
      * {
        border-color: hsl(var(--border));
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          container: {
            center: true,
            padding: "2rem",
            screens: {
              "2xl": "1400px",
            },
          },
          extend: {
            colors: {
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: {
                DEFAULT: "hsl(var(--primary))",
                foreground: "hsl(var(--primary-foreground))",
              },
              secondary: {
                DEFAULT: "hsl(var(--secondary))",
                foreground: "hsl(var(--secondary-foreground))",
              },
              destructive: {
                DEFAULT: "hsl(var(--destructive))",
                foreground: "hsl(var(--destructive-foreground))",
              },
              muted: {
                DEFAULT: "hsl(var(--muted))",
                foreground: "hsl(var(--muted-foreground))",
              },
              accent: {
                DEFAULT: "hsl(var(--accent))",
                foreground: "hsl(var(--accent-foreground))",
              },
              popover: {
                DEFAULT: "hsl(var(--popover))",
                foreground: "hsl(var(--popover-foreground))",
              },
              card: {
                DEFAULT: "hsl(var(--card))",
                foreground: "hsl(var(--card-foreground))",
              },
            },
            borderRadius: {
              lg: "var(--radius)",
              md: "calc(var(--radius) - 2px)",
              sm: "calc(var(--radius) - 4px)",
            },
            keyframes: {
              "dialog-overlay-show": {
                "0%": { opacity: "0" },
                "100%": { opacity: "1" },
              },
              "dialog-content-show": {
                "0%": { opacity: "0", transform: "translate(-50%, -50%) scale(0.96)" },
                "100%": { opacity: "1", transform: "translate(-50%, -50%) scale(1)" },
              },
              "scale-in": {
                "0%": { opacity: "0", transform: "scale(0.96)" },
                "100%": { opacity: "1", transform: "scale(1)" },
              }
            },
            animation: {
              "dialog-overlay-show": "dialog-overlay-show 0.15s ease-out forwards",
              "dialog-content-show": "dialog-content-show 0.15s ease-out forwards",
              "scale-in": "scale-in 0.1s ease-out forwards",
            }
          },
        },
      }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css" integrity="sha512-5qm+l5XJdJzXQZnFwS0DljTD3WjkN0wbM8YM0sX4+bF/IX2EJcSkTkVMbZn/U+dQVwyEbO32Ox1cCZnMdX4t5Q==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0/",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://esm.sh/lucide-react@0.447.0?external=react,react-dom",
    "pdf-lib": "https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.esm.min.js",
    "pdfjs-dist": "https://aistudiocdn.com/pdfjs-dist@3.11.174",
    "clsx": "https://aistudiocdn.com/clsx@^2.1.1",
    "tailwind-merge": "https://aistudiocdn.com/tailwind-merge@^3.4.0",
    "@radix-ui/react-slot": "https://esm.sh/@radix-ui/react-slot@1.1.0?external=react,react-dom",
    "@radix-ui/react-label": "https://esm.sh/@radix-ui/react-label@2.1.0?external=react,react-dom",
    "@radix-ui/react-switch": "https://esm.sh/@radix-ui/react-switch@1.1.0?external=react,react-dom",
    "@radix-ui/react-separator": "https://esm.sh/@radix-ui/react-separator@1.1.0?external=react,react-dom",
    "@radix-ui/react-select": "https://esm.sh/@radix-ui/react-select@2.1.1?external=react,react-dom",
    "@radix-ui/react-dialog": "https://esm.sh/@radix-ui/react-dialog@1.1.1?external=react,react-dom",
    "@radix-ui/react-tabs": "https://esm.sh/@radix-ui/react-tabs@1.1.1?external=react,react-dom",
    "class-variance-authority": "https://esm.sh/class-variance-authority@0.7.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/"
  }
}
</script>
</head>
  <body class="bg-background text-foreground antialiased overflow-hidden transition-colors duration-200">
    <div id="root" class="h-screen w-screen flex flex-col"></div>
  </body>
</html>
