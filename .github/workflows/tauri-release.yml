name: publish-tauri

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: "--target x86_64-pc-windows-msvc"
            portable_artifact_name: tauri-windows-x64-portable
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: "--target x86_64-unknown-linux-gnu"
            portable_artifact_name: tauri-linux-x64-portable
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            args: "--target aarch64-unknown-linux-gnu"
            portable_artifact_name: tauri-linux-arm64-portable
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
            portable_artifact_name: tauri-macos-x64-portable
          - platform: macos-15
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
            portable_artifact_name: tauri-macos-arm64-portable

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies (Ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "FormForge PDF Editor ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install this version."
          generateReleaseNotes: true
          prerelease: false
          releaseDraft: false
          args: ${{ matrix.args }}

      - name: Prepare Windows portable
        if: contains(matrix.target, 'windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path portable-out | Out-Null
          $source = Get-ChildItem "src-tauri/target/${{ matrix.target }}/release" -File -Filter *.exe | Select-Object -First 1
          if (-not $source) { throw "Windows executable not found." }
          $destination = Join-Path "portable-out" ("{0}-${{ github.ref_name }}{1}" -f $source.BaseName, $source.Extension)
          Copy-Item $source.FullName $destination

      - name: Prepare Linux portable
        if: contains(matrix.target, 'linux')
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p portable-out
          source_file="$(find "src-tauri/target/${{ matrix.target }}/release/bundle/appimage" -maxdepth 1 -type f -name '*.AppImage' | head -n 1)"
          [ -n "$source_file" ]
          base_name="$(basename "$source_file")"
          stem="${base_name%.AppImage}"
          cp "$source_file" "portable-out/${stem}-${{ github.ref_name }}.AppImage"

      - name: Prepare macOS portable
        if: contains(matrix.target, 'apple-darwin')
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p portable-out
          source_app="$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -type d -name '*.app' | head -n 1)"
          [ -n "$source_app" ]
          app_name="$(basename "$source_app")"
          stem="${app_name%.app}"
          cp -R "$source_app" "portable-out/${stem}-${{ github.ref_name }}.app"

      - name: Upload Windows portable
        if: contains(matrix.target, 'windows')
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.portable_artifact_name }}-${{ github.ref_name }}
          path: portable-out/*.exe
          if-no-files-found: error

      - name: Upload Linux portable
        if: contains(matrix.target, 'linux')
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.portable_artifact_name }}-${{ github.ref_name }}
          path: portable-out/*.AppImage
          if-no-files-found: error

      - name: Upload macOS portable
        if: contains(matrix.target, 'apple-darwin')
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.portable_artifact_name }}-${{ github.ref_name }}
          path: portable-out/*.app
          if-no-files-found: error
