name: build-tauri

on:
  workflow_dispatch:
  push:
  pull_request:

concurrency:
  group: tauri-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: tauri-windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: tauri-linux-x64
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: tauri-linux-arm64
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: tauri-macos-x64
          - platform: macos-15
            target: aarch64-apple-darwin
            artifact_name: tauri-macos-arm64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun run build:app -- --target ${{ matrix.target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/**
          if-no-files-found: error
