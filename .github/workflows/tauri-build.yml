name: build-tauri

on:
  workflow_dispatch:
  push:
  pull_request:

concurrency:
  group: tauri-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.3"
  RUST_NIGHTLY_TOOLCHAIN: nightly-2026-04-01

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: tauri-windows-x64
            portable_artifact_name: tauri-windows-x64-portable
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: tauri-linux-x64
            portable_artifact_name: tauri-linux-x64-portable
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: tauri-linux-arm64
            portable_artifact_name: tauri-linux-arm64-portable
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: tauri-macos-x64
            portable_artifact_name: tauri-macos-x64-portable
          - platform: macos-15
            target: aarch64-apple-darwin
            artifact_name: tauri-macos-arm64
            portable_artifact_name: tauri-macos-arm64-portable

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set short commit SHA
        shell: bash
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Restore Bun package cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ runner.arch }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-bun-${{ env.BUN_VERSION }}-
            ${{ runner.os }}-${{ runner.arch }}-bun-

      - name: Restore Rust nightly toolchain cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: ${{ runner.os }}-${{ runner.arch }}-rustup-${{ matrix.target }}-${{ env.RUST_NIGHTLY_TOOLCHAIN }}

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_NIGHTLY_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          shared-key: tauri-${{ matrix.target }}
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun run build:app -- --target ${{ matrix.target }}

      - name: Upload Linux build artifacts
        if: contains(matrix.target, 'linux')
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}-${{ env.SHORT_SHA }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
          if-no-files-found: error

      - name: Upload non-Linux build artifacts
        if: ${{ !contains(matrix.target, 'linux') }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}-${{ env.SHORT_SHA }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/**
          if-no-files-found: error

      - name: Prepare Windows portable
        if: contains(matrix.target, 'windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path portable-out | Out-Null
          $source = Get-ChildItem "src-tauri/target/${{ matrix.target }}/release" -File -Filter *.exe | Select-Object -First 1
          if (-not $source) { throw "Windows executable not found." }
          $destination = Join-Path "portable-out" ("{0}-{1}{2}" -f $source.BaseName, $env:SHORT_SHA, $source.Extension)
          Copy-Item $source.FullName $destination

      - name: Prepare Linux portable
        if: contains(matrix.target, 'linux')
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p portable-out
          release_dir="src-tauri/target/${{ matrix.target }}/release"
          source_file="$(find "$release_dir" -maxdepth 1 -type f -executable | head -n 1)"
          [ -n "$source_file" ]
          base_name="$(basename "$source_file")"
          install -m 755 "$source_file" "portable-out/${base_name}-${SHORT_SHA}"

      - name: Prepare macOS portable
        if: contains(matrix.target, 'apple-darwin')
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p portable-out
          release_dir="src-tauri/target/${{ matrix.target }}/release"
          source_file="$release_dir/Legir"
          if [ ! -f "$source_file" ]; then
            source_file="$(find "$release_dir/bundle/macos" -path '*.app/Contents/MacOS/*' -type f | head -n 1)"
          fi
          [ -n "$source_file" ]
          [ -f "$source_file" ]
          base_name="$(basename "$source_file")"
          install -m 755 "$source_file" "portable-out/${base_name}-${SHORT_SHA}"

      - name: Upload Windows portable
        if: contains(matrix.target, 'windows')
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.portable_artifact_name }}-${{ env.SHORT_SHA }}
          path: portable-out/*.exe
          if-no-files-found: error

      - name: Upload Linux portable
        if: contains(matrix.target, 'linux')
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.portable_artifact_name }}-${{ env.SHORT_SHA }}
          path: portable-out/*
          if-no-files-found: error

      - name: Upload macOS portable
        if: contains(matrix.target, 'apple-darwin')
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.portable_artifact_name }}-${{ env.SHORT_SHA }}
          path: portable-out/*
          if-no-files-found: error
